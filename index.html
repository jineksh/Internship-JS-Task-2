<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Document</title>
</head>

<body>

    <section class="signup-container">

        <div class="form-header">
            <h2 id="signupTitle" class="main-title">Create Your Account</h2>
            <p id="signupSubtitle" class="sub-text">Join our community for the best deals!</p>
        </div>

        <form id="registrationForm" class="ecommerce-form">

            <div class="form-group">
                <label for="fullName">Full Name :</label>
                <input type="text" id="fullName" class="form-control" placeholder="John Doe">
                <p id="nameError" class="error-text"></p>
            </div>

            <div class="form-group">
                <label for="email">Email Address :</label>
                <input type="email" id="email" class="form-control" placeholder="john@example.com">
                <span id="emailError" class="error-text"></span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number :</label>
                <input type="tel" id="phone" class="form-control" placeholder="+1 234 567 890">
                <span id="phoneError" class="error-text"></span>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth :</label>
                <input type="date" id="dob" class="form-control">
                <span id="dobError" class="error-text"></span>
            </div>

            <div class="form-group">
                <label for="password">Password :</label>
                <input type="password" id="password" class="form-control" placeholder="At least 8 characters">
                <span id="passwordError" class="error-text"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password :</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password">
                <span id="confirmError" class="error-text"></span>
            </div>

            <div class="form-group-checkbox">
                <input type="checkbox" id="terms" name="terms">
                <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
                <span id="termsError" class="error-text"></span>
            </div>

            <div class="form-actions">
                <button type="submit" id="submitBtn" class="btn-primary">Sign Up</button>
            </div>

        </form>
    </section>

    <script src="index.js"></script>
</body>

</html>
